name: Arctic CI

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"

permissions:
    contents: write

jobs:
    run-tests:
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        runs-on: ubuntu-latest
        steps:
            -
                uses: actions/checkout@v4
            -
                uses: actions/setup-node@v4
                with:
                    node-version: 20
            -
                uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
            -
                name: Go mod download
                run: go mod download
            -
                name: Run Go tests
                shell: bash
                run: go test ./... -v -timeout 10m -count=1
            -
                name: Run coverage
                shell: bash
                run: go test ./tests/coverage ./tests/implementation -coverpkg=github.com/z46-dev/arctic -covermode=atomic -coverprofile=coverage.out -timeout 10m -count=1
            -
                name: Compile benchmarks
                shell: bash
                run: go test ./tests/benchmark -run=^$ -bench=^$ -count=1
